<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttoGrid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">⚡ AttoGrid</span>
      <span class="sub">데이터센터 DWG 도구 · ATTO Research</span>
    </div>
    <div class="filebar">
      <button id="btn-open" class="primary">도면 열기 (.dwg/.json)</button>
      <input id="pathinput" class="pathinput" placeholder="또는 경로 직접 입력 (예: real.json)">
      <button id="btn-load">열기</button>
      <span id="filepath" class="filepath">파일을 선택하세요</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="inspect">개요</button>
    <button class="tab" data-tab="preview">도면</button>
    <button class="tab" data-tab="model3d">3D</button>
    <button class="tab" data-tab="texts">텍스트</button>
    <button class="tab" data-tab="validate">전압 검증</button>
    <button class="tab" data-tab="translate">번역</button>
  </nav>

  <main>
    <section id="inspect" class="panel active">
      <div class="toolbar"><button data-run="inspect">분석</button></div>
      <div id="inspect-out" class="out"></div>
    </section>

    <section id="preview" class="panel">
      <div class="toolbar">
        <button data-run="preview">도면 렌더</button>
        <button id="btn-fit">원래대로</button>
        <span class="hint">휠: 확대/축소 · 드래그: 이동</span>
        <span style="flex:1"></span>
        <label><input type="checkbox" id="img-markers"> 전압 마커 포함</label>
        <button id="btn-png">PNG 저장</button>
        <button id="btn-svg">SVG 저장</button>
      </div>
      <div class="toolbar">
        <label>구획
          <select id="part-method">
            <option value="auto">자동(프레임)</option>
            <option value="cluster">공간 클러스터</option>
            <option value="grid">격자 2×2</option>
          </select>
        </label>
        <span id="grid-opts">행<input type="number" id="grid-rows" value="2" min="1" max="8" style="width:48px">
          열<input type="number" id="grid-cols" value="2" min="1" max="8" style="width:48px"></span>
        <button id="btn-partition">구획 미리보기</button>
        <button id="btn-sections">구획별 이미지 저장</button>
        <span id="part-info" class="hint"></span>
      </div>
      <div id="section-list"></div>
      <div id="preview-out" class="out preview-out"></div>
    </section>

    <section id="model3d" class="panel">
      <div class="toolbar">
        <button data-run="model3d">3D 생성</button>
        <span class="hint">닫힌 윤곽을 박스로 압출 · 드래그로 회전, 휠로 확대</span>
      </div>
      <div id="model3d-out" class="out model3d-out"></div>
    </section>

    <section id="texts" class="panel">
      <div class="toolbar">
        <label><input type="checkbox" id="texts-tonly"> 번역 대상만</label>
        <button data-run="texts">추출</button>
      </div>
      <div id="texts-out" class="out"></div>
    </section>

    <section id="validate" class="panel">
      <div class="toolbar">
        <button data-run="validate">검증 실행</button>
        <button id="btn-locate">도면에서 위치 보기</button>
        <label><input type="checkbox" id="loc-all"> 정상 전압도 표시(초록)</label>
        <span class="hint">위반=빨강 · 정상=초록</span>
      </div>
      <div id="validate-out" class="out"></div>
    </section>

    <section id="translate" class="panel">
      <div class="toolbar">
        <label>엔진
          <select id="tr-backend">
            <option value="argos">argos (무료·오프라인)</option>
            <option value="deepl">DeepL (API키 필요)</option>
            <option value="mock">mock (사전/보호만)</option>
          </select>
        </label>
        <label>개수 <input type="number" id="tr-limit" value="30" min="1" max="500" style="width:64px"></label>
        <button data-run="translate">번역</button>
        <span style="flex:1"></span>
        <button id="btn-export-csv" disabled>CSV 내보내기</button>
        <button id="btn-export-json" disabled>JSON 내보내기</button>
      </div>
      <div id="translate-out" class="out"></div>
    </section>
  </main>

  <footer><span id="status">준비됨</span></footer>
  <script src="panzoom.js"></script>
  <script src="vendor/three.min.js"></script>
  <script src="vendor/OrbitControls.js"></script>
  <script src="three-view.js"></script>
  <script src="app.js"></script>
</body>
</html>
