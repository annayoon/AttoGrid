# AttoGrid nginx 리버스 프록시 설정
#
# 설치 위치:
#   /etc/nginx/sites-available/attogrid
#
# 활성화:
#   sudo ln -s /etc/nginx/sites-available/attogrid /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream attogrid_backend {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 80;
    server_name _;          # 사내 IP 접속 — 도메인 있으면 여기에 입력

    # 대형 DWG 파일 업로드 허용 (최대 500MB)
    client_max_body_size 500M;
    client_body_timeout  120s;

    # Ollama 번역은 응답이 오래 걸릴 수 있음
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    proxy_connect_timeout 10s;

    access_log /var/log/nginx/attogrid_access.log;
    error_log  /var/log/nginx/attogrid_error.log;

    location / {
        proxy_pass         http://attogrid_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 큰 응답(SVG) 버퍼링 최적화
        proxy_buffer_size       64k;
        proxy_buffers           8 64k;
        proxy_busy_buffers_size 128k;
    }

    # 정적 파일은 nginx가 직접 서빙 (Flask 우회 → 빠름)
    # 경로는 setup.sh가 실제 설치 경로로 치환함
    location /vendor/ {
        alias __INSTALL_DIR__/ui/vendor/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ \.(js|css|png|svg|ico)$ {
        proxy_pass         http://attogrid_backend;
        expires            1h;
        add_header         Cache-Control "public";
    }
}
